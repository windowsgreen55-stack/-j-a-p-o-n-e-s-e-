<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WebSite Closed</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000;
      color: #ff0000;
      font-family: monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .container {
      text-align: center;
    }
    h1 {
      font-size: 120px;
      margin: 0;
      text-shadow: 0 0 30px #ff0000, 0 0 60px #ff0000;
      animation: pulse 2s infinite;
    }
    p {
      font-size: 36px;
      margin: 20px 0 0;
      opacity: 0.9;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.05); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>WebSite Closed :/</h1>
    <p>Nothing to see here anymore...</p>
  </div>
</body>
</html>
